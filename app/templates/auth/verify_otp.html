{% extends "base.html" %}
{% block title %}Verify OTP — PromptEarn{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center -mt-8">
    <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-md text-center">
        <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
            <span class="text-3xl">📧</span>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Check Your Email</h1>
        <p class="text-gray-500 mb-6 text-sm">We sent a 6-digit verification code to your email. Enter it below.</p>

        {% if error %}
        <div class="bg-red-50 border border-red-200 text-red-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="bg-green-50 border border-green-200 text-green-700 rounded-lg px-4 py-3 mb-4 text-sm">{{ success }}</div>
        {% endif %}

        <form method="post" action="/auth/verify-otp" class="space-y-4">
            <input type="text" name="otp" required maxlength="6" placeholder="Enter 6-digit code"
                class="w-full border border-gray-300 rounded-lg px-3 py-3 text-center text-2xl font-bold tracking-widest focus:outline-none focus:ring-2 focus:ring-brand-700">
            <button type="submit" class="w-full bg-brand-700 text-white py-3 rounded-lg font-semibold hover:bg-brand-800 transition">
                Verify & Continue
            </button>
        </form>

        <form method="post" action="/auth/resend-otp" class="mt-4">
            <button type="submit" class="text-sm text-brand-700 hover:underline">Resend OTP</button>
        </form>
    </div>
</div>
{% endblock %}
