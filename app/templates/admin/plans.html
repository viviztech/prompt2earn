{% extends "admin/base_admin.html" %}
{% block title %}Plans — Admin{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Subscription Plans</h1>
<div class="grid md:grid-cols-3 gap-6">
    {% for plan in plans %}
    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-4">{{ plan.display_name }}</h2>
        <form method="post" action="/admin/plans/{{ plan.id }}/update" class="space-y-3">
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Display Name</label>
                <input type="text" name="display_name" value="{{ plan.display_name }}" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-700">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Price (₹)</label>
                <input type="number" name="price_inr" value="{{ plan.price_inr }}" step="0.01" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-700">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Duration (days)</label>
                <input type="number" name="duration_days" value="{{ plan.duration_days }}" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-700">
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-600 mb-1">Point Multiplier</label>
                <input type="number" name="point_multiplier" value="{{ plan.point_multiplier }}" step="0.1" min="0.1" required
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-700">
            </div>
            <button type="submit" class="w-full bg-brand-700 text-white py-2 rounded-lg font-semibold text-sm hover:bg-brand-800 transition mt-2">Update Plan</button>
        </form>
    </div>
    {% endfor %}
</div>
{% endblock %}
